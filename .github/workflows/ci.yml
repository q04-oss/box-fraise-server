name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: box_fraise
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MIGRATION_DATABASE_URL: postgresql://postgres:postgres@localhost:5434/box_fraise
      DATABASE_URL: postgresql://bf_app:bf_app@localhost:5434/box_fraise

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Create runtime role
        # docker-compose's init script only fires on host-managed
        # volumes; in the GH service container we apply it manually.
        run: |
          psql "$MIGRATION_DATABASE_URL" -f docker/init/01-roles.sql

      - name: Apply migrations
        # Migrations run as the owner role so RLS is created cleanly.
        # If schema and code drift, this step fails loud and early —
        # exactly the property we want from CI.
        run: |
          psql "$MIGRATION_DATABASE_URL" -f migrations/0001_init.sql

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --test integration --release -- --test-threads=4
