<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Card — box fraise</title>
  <meta name="description" content="Verify a Box Fraise identity card.">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:     #ffffff;
      --ink:    #1a1a1a;
      --rule:   #e6e6e6;
      --muted:  #666666;
      --accent: #b21b1b;
      --ok:     #2c6e35;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    main {
      flex: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 56px 24px 64px;
    }
    .backlink {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 40px;
    }
    .backlink:hover { color: var(--ink); }
    h1 {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(28px, 4.5vw, 40px);
      margin: 0 0 24px;
    }
    .card-panel {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 28px 26px;
    }
    .serial {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: clamp(15px, 3vw, 20px);
      font-weight: 500;
      letter-spacing: 0.12em;
      color: var(--ink);
      margin-bottom: 20px;
      word-break: break-all;
    }
    .badge {
      display: inline-block;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      padding: 5px 12px;
      border-radius: 999px;
      margin-bottom: 16px;
    }
    .badge.valid { border: 1px solid var(--ok); color: var(--ok); }
    .badge.dead  { border: 1px solid var(--accent); color: var(--accent); }
    .meta {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin: 4px 0;
    }
    .prose {
      font-size: 15px;
      line-height: 1.6;
      color: var(--muted);
      margin-top: 20px;
    }
    .status {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    form.serial-form {
      display: flex;
      gap: 8px;
      margin-top: 20px;
    }
    form.serial-form input {
      flex: 1;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 10px 12px;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 14px;
    }
    form.serial-form button {
      background: var(--ink);
      color: var(--bg);
      border: 0;
      padding: 10px 18px;
      border-radius: 4px;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <a class="backlink" href="/">← box fraise</a>

    <h1>Verify a card</h1>

    <div id="content">
      <div class="status">looking up…</div>
    </div>
  </main>

  <script>
    const content = document.getElementById('content');

    function esc(s) {
      return String(s).replace(/[<>&"']/g, c => ({
        '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'
      })[c]);
    }
    function fmtDate(iso) {
      return new Date(iso).toLocaleDateString(undefined, {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });
    }

    function renderPrompt(msg) {
      content.innerHTML = `
        <p class="prose">${esc(msg || 'Enter the serial from a Box Fraise identity card to check whether it’s valid.')}</p>
        <form class="serial-form" id="serial-form">
          <input id="serial-input" type="text" placeholder="XXXX-XXXX-XXXX-XXXX-XXXX" autocomplete="off" spellcheck="false" autocapitalize="characters">
          <button type="submit">Verify</button>
        </form>
      `;
      document.getElementById('serial-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const s = document.getElementById('serial-input').value.trim();
        if (!s) return;
        const url = new URL(location.href);
        url.searchParams.set('serial', s);
        location.href = url.toString();
      });
    }

    async function lookup(serial) {
      content.innerHTML = `<div class="status">looking up…</div>`;
      try {
        const r = await fetch('/v1/cards/' + encodeURIComponent(serial));
        if (r.status === 404) {
          renderPrompt('That serial doesn’t match any Box Fraise card. Check the characters and try again.');
          return;
        }
        if (!r.ok) throw new Error('http ' + r.status);
        const c = await r.json();
        renderCard(c);
      } catch (err) {
        renderPrompt('Something went wrong looking up that card. Try again.');
        console.error(err);
      }
    }

    function renderCard(c) {
      const badge = c.is_valid
        ? `<span class="badge valid">Valid</span>`
        : `<span class="badge dead">${esc(c.status)}</span>`;
      content.innerHTML = `
        <div class="card-panel">
          ${badge}
          <div class="serial">${esc(c.serial)}</div>
          <div class="meta">Issued · ${esc(fmtDate(c.issued_at))}</div>
          <div class="meta">Design · ${esc(c.design_version)}</div>
        </div>
        ${c.is_valid
          ? '<p class="prose">This is a valid Box Fraise identity card. It was issued after a private in-person consultation with a Box Fraise consultant. The card is the physical artifact of that consultation.</p>'
          : '<p class="prose">This card was once issued by Box Fraise but is no longer active. The holder should visit any Box Fraise location to have it replaced.</p>'
        }
        <p style="margin-top: 20px;"><a class="backlink" href="/card">Look up another →</a></p>
      `;
    }

    const params = new URLSearchParams(location.search);
    const serial = params.get('serial');
    if (serial) {
      lookup(serial);
    } else {
      renderPrompt();
    }
  </script>
</body>
</html>
