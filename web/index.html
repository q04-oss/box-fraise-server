<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>box fraise</title>
  <meta name="description" content="A hair-events community. Private by default, verified in person.">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #ffffff;
      --ink:     #1a1a1a;
      --rule:    #e6e6e6;
      --muted:   #666666;
      --accent:  #b21b1b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      max-width: 900px;
      width: 100%;
      padding: 24px;
      text-align: left;
      /* Slight upward bias — the composition sits at ~45% from the
         top, not 50%. Reads more intentional than dead-centre. */
      margin-bottom: 5vh;
      display: flex;
      gap: 56px;
      align-items: flex-start;
    }
    /* Column ordering: directory on the LEFT as a compact reference
       list; search on the RIGHT, wider, as the primary interactive
       surface. Source order keeps search first (it's the primary UI
       for tab/screen-reader users); CSS `order` handles the visual
       flip. On mobile the stack reverts to search-first (top) via
       the media query below. */
    .col-search {
      order: 2;
      flex: 1;
      min-width: 0;
    }

    /* Wordmark sits in the bottom-right as a signature — fixed so it
       stays visible whether the reader has scrolled or not.
       Positioned opposite the directory column so the composition
       carries weight on both sides of the page. */
    .wordmark {
      position: fixed;
      bottom: 22px;
      right: 24px;
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 22px;
      line-height: 1;
      letter-spacing: -0.01em;
      margin: 0;
      z-index: 10;
      background: linear-gradient(to left, var(--bg) 90%, rgba(255,255,255,0));
      padding-left: 10px;
    }
    .wordmark a {
      color: inherit;
      text-decoration: none;
    }

    .search {
      margin: 0;
      width: 100%;
      display: flex;
      align-items: baseline;
      border-bottom: 1px solid var(--rule);
      padding: 8px 4px 8px 0;
      transition: border-color 140ms ease;
    }
    .search:focus-within { border-color: var(--ink); }
    .search::before {
      content: "›";
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 14px;
      color: var(--muted);
      margin-right: 12px;
      line-height: 1;
    }
    .search input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 14px;
      color: var(--ink);
      caret-color: var(--accent);
      padding: 0;
    }
    .search input::placeholder {
      color: var(--muted);
      font-style: normal;
    }
    .hint {
      width: 100%;
      margin: 10px 0 0;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-align: right;
    }
    .directory {
      order: 1;
      flex: 0 0 280px;
      min-width: 0;
    }

    /* ── Search results ─────────────────────────────────────────── */
    .results {
      width: 100%;
      margin: 24px 0 0;
      padding: 0;
      font-family: 'Newsreader', serif;
      text-align: left;
    }
    /* When no results are showing, the section collapses so it
       doesn't add an empty gap between the hint and the directory
       — search area sits directly against the directory's rule. */
    .results:empty { margin: 0; }
    .results-status {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 0;
    }
    .result {
      display: block;
      padding: 14px 4px;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
    }
    .result:last-child { border-bottom: 0; }
    .result-title {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .result-url {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      word-break: break-all;
    }
    .result-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }
    .action-key {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 15px;
      color: var(--ink);
      letter-spacing: 0.02em;
    }
    .attribution {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding: 16px 0 4px;
      text-align: center;
    }

    /* ── Directory ─────────────────────────────────────────── */
    /* Base padding/margin — mobile stack re-adds a top rule below. */
    .directory-label {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .directory-label a {
      color: var(--muted);
      text-decoration: none;
      margin-left: 8px;
      transition: color 120ms ease;
    }
    .directory-label a:hover { color: var(--ink); }
    .business {
      padding: 12px 0;
      border-bottom: 1px solid var(--rule);
    }
    .business:last-child { border-bottom: 0; }
    .business-name {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-size: 17px;
      color: var(--ink);
      display: block;
      text-decoration: none;
      transition: color 120ms ease;
    }
    .business-name:hover { color: var(--accent); }
    .business-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 4px;
    }
    .directory-empty {
      font-family: 'Newsreader', serif;
      font-style: italic;
      color: var(--muted);
      font-size: 14px;
      padding: 6px 0 12px;
    }
    .directory-signup {
      margin: 22px 0 0;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
    }
    .directory-signup a {
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 2px;
    }
    .directory-signup a:hover { border-bottom-color: var(--ink); }

    /* Stack the two columns vertically on narrow viewports. Below
       720px there isn't horizontal room for 300px + 56px gap + a
       readable directory column, so we fall back to the vertical
       rhythm that predated the split layout. */
    @media (max-width: 720px) {
      main {
        flex-direction: column;
        gap: 0;
        max-width: 520px;
      }
      /* Stacked: search on top (primary), directory below. Overrides
         the desktop `order` values so mobile matches the source
         order and the search-first ethos. */
      .col-search { order: 0; flex: 1 1 auto; width: 100%; }
      .directory {
        order: 1;
        flex: 1 1 auto;
        margin-top: 36px;
        padding-top: 22px;
        border-top: 1px solid var(--rule);
      }
    }
    @media (max-width: 600px) {
      main { padding: 56px 22px 120px; }
      .wordmark { font-size: 20px; bottom: 18px; right: 20px; }
    }

  </style>
</head>
<body>
  <h1 class="wordmark"><a href="/">box fraise</a></h1>

  <main>
    <div class="col-search">
      <form class="search" role="search" aria-label="Private search" id="search-form">
        <input
          type="search"
          name="q"
          autocomplete="off"
          spellcheck="false"
          autocapitalize="off"
          placeholder="for better taste"
          aria-label="Search"
          id="search-input"
        >
      </form>

      <div class="hint">type / for actions</div>

      <section class="results" id="results" aria-live="polite"></section>
    </div>

    <section class="directory" aria-label="Business directory">
      <div class="directory-label">directory · <a href="/portraits">how this works →</a> · <a href="https://www.youtube.com/watch?v=Br2Gn60RYmA" target="_blank" rel="noopener noreferrer">watch me explain →</a></div>
      <div id="directory-list"></div>
      <p class="directory-signup">To add your business, email <a href="mailto:hello@fraise.box">hello@fraise.box</a>.</p>
    </section>
  </main>

  <script>
    // Search bar behaviour:
    //   - Typing a known action word (with or without leading `/`) and
    //     pressing Enter navigates to the action URL.
    //   - Typing `/` alone (or `/` + partial match) reveals the action
    //     menu inline; users can click a row to jump.
    //   - Anything else falls through to the Brave search — the
    //     same-origin /v1/search proxy keeps the API key server-side
    //     and query text unlogged.
    const form  = document.getElementById('search-form');
    const input = document.getElementById('search-input');
    const box   = document.getElementById('results');

    const ACTIONS = [
      { keys: ['pass'],      url: '/pass',      label: 'Authenticate at an event' },
      { keys: ['events'],    url: '/events',    label: 'Upcoming events' },
      { keys: ['vision'],    url: '/vision',    label: 'What Box Fraise is' },
      { keys: ['questions'], url: '/questions', label: 'The record of questions raised' },
      { keys: ['donations'], url: '/donations', label: 'The Legal Justice Fund' },
      { keys: ['portraits'],  url: '/portraits',  label: 'Licensing portraits — for businesses' },
      { keys: ['rajzyngier'], url: '/rajzyngier', label: 'Rajzyngier Research — the lab behind Box Fraise' },
      { keys: ['youtube'],    url: 'https://www.youtube.com/@BoxFraise', label: 'YouTube channel' },
    ];

    function isExternal(url) { return /^https?:\/\//i.test(url); }

    function normalize(q) {
      return q.trim().toLowerCase().replace(/^\//, '');
    }

    function resolveAction(q) {
      const key = normalize(q);
      if (!key) return null;
      return ACTIONS.find(a => a.keys.includes(key)) || null;
    }

    function renderActionMenu(rawFilter) {
      box.replaceChildren();
      const wanted = (rawFilter || '').toLowerCase().replace(/^\//, '');
      const shown = ACTIONS.filter(a =>
        !wanted || a.keys.some(k => k.startsWith(wanted))
      );
      for (const a of shown) {
        const el = document.createElement('a');
        el.href = a.url;
        el.className = 'result';
        if (isExternal(a.url)) {
          el.target = '_blank';
          el.rel = 'noopener noreferrer';
        }
        const t = document.createElement('div');
        t.className = 'result-title';
        const k = document.createElement('span');
        k.className = 'action-key';
        k.textContent = '/' + a.keys[0];
        t.append(k);
        const d = document.createElement('div');
        d.className = 'result-desc';
        d.textContent = a.label;
        el.append(t, d);
        box.append(el);
      }
    }

    function status(text) {
      box.replaceChildren();
      const el = document.createElement('div');
      el.className = 'results-status';
      el.textContent = text;
      box.append(el);
    }

    function attribute() {
      const el = document.createElement('div');
      el.className = 'attribution';
      el.textContent = 'Search by Brave';
      box.append(el);
    }

    // Directory: fetch on load, cache the full list, render.
    // Text typed into the search bar filters the directory live —
    // matches on name or description, case-insensitive.
    let allBusinesses = [];

    (async () => {
      try {
        const r = await fetch('/v1/businesses');
        if (!r.ok) return;
        allBusinesses = await r.json();
        renderDirectory('');
      } catch { /* silent — the directory simply doesn't render */ }
    })();

    function renderDirectory(rawFilter) {
      const el = document.getElementById('directory-list');
      el.replaceChildren();

      if (!allBusinesses.length) {
        const empty = document.createElement('div');
        empty.className = 'directory-empty';
        empty.textContent = 'No businesses yet. Be the first.';
        el.append(empty);
        return;
      }

      const filter = (rawFilter || '').trim().toLowerCase();
      const shown = filter
        ? allBusinesses.filter(b =>
            b.name.toLowerCase().includes(filter) ||
            (b.description && b.description.toLowerCase().includes(filter))
          )
        : allBusinesses;

      if (!shown.length) {
        const empty = document.createElement('div');
        empty.className = 'directory-empty';
        empty.textContent = 'No businesses match. Press Enter to search the web.';
        el.append(empty);
        return;
      }

      for (const b of shown) {
        const row = document.createElement('div');
        row.className = 'business';
        if (b.slug) {
          // Internal business page. Deliberately not linking to the
          // business's own website: the directory is a signal of
          // participation, not a portal off the platform.
          const a = document.createElement('a');
          a.className = 'business-name';
          a.href = '/business/' + encodeURIComponent(b.slug);
          a.textContent = b.name;
          row.append(a);
        } else {
          const name = document.createElement('span');
          name.className = 'business-name';
          name.textContent = b.name;
          row.append(name);
        }
        if (b.description) {
          const desc = document.createElement('div');
          desc.className = 'business-desc';
          desc.textContent = b.description;
          row.append(desc);
        }
        el.append(row);
      }
    }

    // Live menu: as the user types "/..." reveal matching actions.
    // Everything else filters the directory live.
    input.addEventListener('input', () => {
      const v = input.value;
      if (v.startsWith('/')) {
        renderActionMenu(v.slice(1));
        return;
      }
      // Non-slash typing clears any active results and filters the
      // directory to matching rows. Empty input restores the full list.
      if (!v.trim()) {
        box.replaceChildren();
      }
      renderDirectory(v);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) { box.replaceChildren(); return; }

      // Action match beats search.
      const action = resolveAction(q);
      if (action) {
        if (isExternal(action.url)) {
          window.open(action.url, '_blank', 'noopener,noreferrer');
        } else {
          window.location.assign(action.url);
        }
        return;
      }

      status('searching…');
      try {
        const r = await fetch('/v1/search?q=' + encodeURIComponent(q));
        if (!r.ok) {
          const body = await r.text();
          status('search failed (' + r.status + ')');
          console.error(body);
          return;
        }
        const data = await r.json();
        box.replaceChildren();
        if (!data.results.length) {
          status('no results');
          return;
        }
        for (const res of data.results) {
          const a = document.createElement('a');
          a.href = res.url;
          a.rel  = 'noopener noreferrer';
          a.className = 'result';
          const t = document.createElement('div');
          t.className = 'result-title';
          t.textContent = res.title;
          const u = document.createElement('div');
          u.className = 'result-url';
          u.textContent = res.url;
          const d = document.createElement('div');
          d.className = 'result-desc';
          d.textContent = res.description;
          a.append(t, u, d);
          box.append(a);
        }
        attribute();
      } catch (err) {
        status('search failed');
        console.error(err);
      }
    });
  </script>

</body>
</html>
