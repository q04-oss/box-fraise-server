<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>box fraise</title>
  <meta name="description" content="A hair-events community. Private by default, verified in person.">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:      #ffffff;
      --ink:     #1a1a1a;
      --rule:    #e6e6e6;
      --muted:   #666666;
      --accent:  #b21b1b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      text-align: center;
    }

    .wordmark {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(44px, 7vw, 88px);
      letter-spacing: -0.02em;
      line-height: 0.95;
      margin: 0;
    }

    .search {
      margin-top: 44px;
      max-width: 440px;
      width: 100%;
      display: flex;
      align-items: baseline;
      border-bottom: 1px solid var(--rule);
      padding: 8px 4px 8px 0;
      transition: border-color 140ms ease;
    }
    .search:focus-within { border-color: var(--ink); }
    .search::before {
      content: "›";
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 14px;
      color: var(--muted);
      margin-right: 12px;
      line-height: 1;
    }
    .search input {
      flex: 1;
      min-width: 0;
      border: 0;
      outline: 0;
      background: transparent;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 14px;
      color: var(--ink);
      caret-color: var(--accent);
      padding: 0;
    }
    .search input::placeholder {
      color: var(--muted);
      font-style: normal;
    }

    footer {
      border-top: 1px solid var(--rule);
      padding: 22px 24px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 28px;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      background: transparent;
    }
    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 120ms ease;
    }
    footer a:hover { color: var(--ink); }

    /* ── Search results ─────────────────────────────────────────── */
    .results {
      width: 100%;
      max-width: 640px;
      margin: 24px auto 0;
      padding: 0 4px;
      font-family: 'Newsreader', serif;
      text-align: left;
    }
    .results-status {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
      padding: 6px 0;
    }
    .result {
      display: block;
      padding: 14px 4px;
      border-bottom: 1px solid var(--rule);
      text-decoration: none;
      color: inherit;
    }
    .result:last-child { border-bottom: 0; }
    .result-title {
      font-size: 17px;
      font-weight: 500;
      line-height: 1.3;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .result-url {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      word-break: break-all;
    }
    .result-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.45;
    }
    .attribution {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding: 16px 0 4px;
      text-align: center;
    }

  </style>
</head>
<body>
  <main>
    <h1 class="wordmark">box fraise</h1>

    <form class="search" role="search" aria-label="Private search" id="search-form">
      <input
        type="search"
        name="q"
        autocomplete="off"
        spellcheck="false"
        autocapitalize="off"
        placeholder="private search"
        aria-label="Search"
        id="search-input"
      >
    </form>

    <section class="results" id="results" aria-live="polite"></section>
  </main>

  <script>
    // Same-origin proxy through /v1/search — the Brave API key never
    // touches the browser. Query text is not logged server-side.
    const form  = document.getElementById('search-form');
    const input = document.getElementById('search-input');
    const box   = document.getElementById('results');

    function status(text) {
      box.replaceChildren();
      const el = document.createElement('div');
      el.className = 'results-status';
      el.textContent = text;
      box.append(el);
    }

    function attribute() {
      const el = document.createElement('div');
      el.className = 'attribution';
      el.textContent = 'Search by Brave';
      box.append(el);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const q = input.value.trim();
      if (!q) { box.replaceChildren(); return; }
      status('searching…');
      try {
        const r = await fetch('/v1/search?q=' + encodeURIComponent(q));
        if (!r.ok) {
          const body = await r.text();
          status('search failed (' + r.status + ')');
          console.error(body);
          return;
        }
        const data = await r.json();
        box.replaceChildren();
        if (!data.results.length) {
          status('no results');
          return;
        }
        for (const res of data.results) {
          const a = document.createElement('a');
          a.href = res.url;
          a.rel  = 'noopener noreferrer';
          a.className = 'result';
          const t = document.createElement('div');
          t.className = 'result-title';
          t.textContent = res.title;
          const u = document.createElement('div');
          u.className = 'result-url';
          u.textContent = res.url;
          const d = document.createElement('div');
          d.className = 'result-desc';
          d.textContent = res.description;
          a.append(t, u, d);
          box.append(a);
        }
        attribute();
      } catch (err) {
        status('search failed');
        console.error(err);
      }
    });
  </script>

  <footer>
    <a href="https://www.youtube.com/@BoxFraise" target="_blank" rel="noopener noreferrer">YouTube</a>
    <a href="/ios">iOS app</a>
  </footer>
</body>
</html>
