<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poster — Harubaku · design study by Box Fraise</title>
  <meta name="description" content="A redesigned coming-soon poster for Harubaku Coffee Roasters, designed in Box Fraise's editorial style. Design study, unaffiliated with the business.">
  <meta name="theme-color" content="#e8e0d0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/studio/harubaku/mock.css">

  <style>
    body {
      background: #e8e0d0;
    }
    main.poster-stage {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }
    .poster-frame {
      width: 100%;
      aspect-ratio: 2 / 2.83; /* matches A-series portrait */
      background: var(--bg);
      box-shadow: 0 30px 60px -20px rgba(30, 20, 12, 0.35),
                  0 12px 24px -8px rgba(30, 20, 12, 0.18);
      overflow: hidden;
    }
    .poster-frame embed,
    .poster-frame object,
    .poster-frame iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
    }
    .poster-fallback {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 40px;
      text-align: center;
    }
    .poster-fallback p {
      font-family: 'Newsreader', serif;
      font-size: 17px;
      color: var(--muted);
      margin: 0 0 20px;
    }
    .poster-actions {
      margin-top: 24px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 16px;
    }
    .poster-caption {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
    }
    .poster-download {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--ink);
      padding-bottom: 2px;
    }
    .poster-download:hover { opacity: 0.7; }

    @media (max-width: 520px) {
      main.poster-stage { padding: 24px 16px 60px; }
    }
  </style>
</head>
<body>
  <div class="study-strip">
    A Box Fraise design study · unaffiliated with Harubaku Coffee Roasters · <a href="/studio/">back to studio</a>
  </div>

  <nav class="nav">
    <a class="wordmark" href="/studio/harubaku/">Harubaku</a>
    <div class="nav-links">
      <a href="/studio/harubaku/">Home</a>
      <a href="/studio/harubaku/coffee/">Coffee</a>
      <a href="/studio/harubaku/story/">Story</a>
      <a href="/studio/harubaku/poster/" class="current">Poster</a>
    </div>
  </nav>

  <main class="poster-stage">
    <div class="poster-frame">
      <object data="/studio/harubaku/poster/harubaku-poster.pdf" type="application/pdf">
        <div class="poster-fallback">
          <p>Your browser can't display this PDF inline.</p>
          <a class="poster-download" href="/studio/harubaku/poster/harubaku-poster.pdf" target="_blank" rel="noopener noreferrer">Open the poster (PDF) →</a>
        </div>
      </object>
    </div>

    <div class="poster-actions">
      <div class="poster-caption">Coming-soon poster · designed to sit in the window in place of the AI collage</div>
      <a class="poster-download" href="/studio/harubaku/poster/harubaku-poster.pdf" target="_blank" rel="noopener noreferrer">Download PDF →</a>
    </div>
  </main>
</body>
</html>
