<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Before & after — box fraise</title>
  <meta name="description" content="A poster redesign for Harubaku Coffee Roasters. Design study, unaffiliated with the business.">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:     #ffffff;
      --ink:    #1a1a1a;
      --rule:   #e6e6e6;
      --muted:  #666666;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 64px;
    }
    .backlink {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 40px;
      transition: color 120ms ease;
    }
    .backlink:hover { color: var(--ink); }
    .comparison {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      align-items: start;
    }
    .comparison-item {
      display: flex;
      flex-direction: column;
    }
    .comparison-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 10px;
    }
    .comparison-item img {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 4px;
    }
    .comparison-pdf {
      display: block;
      width: 100%;
      aspect-ratio: 1 / 1.414;
      border: 0;
      border-radius: 4px;
      background: #e8e0d0;
    }
    @media (max-width: 600px) {
      .comparison { grid-template-columns: 1fr; gap: 28px; }
    }
  </style>
</head>
<body>
  <main>
    <a class="backlink" href="/">← box fraise</a>

    <div class="comparison">
      <div class="comparison-item">
        <div class="comparison-label">Before</div>
        <img src="/studio/harubaku/before-poster.jpg" alt="AI-generated coming-soon poster in the Harubaku storefront window, Edson, Alberta." loading="lazy">
      </div>
      <div class="comparison-item">
        <div class="comparison-label">After</div>
        <object class="comparison-pdf" data="/studio/harubaku/poster/harubaku-poster.pdf#toolbar=0&navpanes=0&scrollbar=0&view=Fit" type="application/pdf" aria-label="Redesigned Harubaku coming-soon poster">
          <a href="/studio/harubaku/poster/harubaku-poster.pdf">See the poster →</a>
        </object>
      </div>
    </div>
  </main>
</body>
</html>
