<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My schedule — box fraise</title>
  <meta name="description" content="Your Box Fraise schedule.">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:     #ffffff;
      --ink:    #1a1a1a;
      --rule:   #e6e6e6;
      --muted:  #666666;
      --accent: #b21b1b;
      --ok:     #2c6e35;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    main {
      flex: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 56px 24px 64px;
      width: 100%;
    }
    .backlink {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 40px;
    }
    .backlink:hover { color: var(--ink); }
    h1 {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(30px, 5vw, 44px);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin: 0 0 8px;
    }
    .sub {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 32px;
    }

    .status {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding: 8px 0;
    }
    .status.ok  { color: var(--ok); }
    .status.err { color: var(--accent); }

    /* ── toolbar ──────────────────────────── */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }
    button, .btn {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 10px 18px;
      border: 1px solid var(--ink);
      border-radius: 4px;
      background: var(--ink);
      color: var(--bg);
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      transition: opacity 120ms ease;
    }
    button.secondary, .btn.secondary {
      background: var(--bg);
      color: var(--ink);
    }
    button:hover, .btn:hover { opacity: 0.85; }

    /* ── item card ─────────────────────────── */
    .item {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 6px;
      line-height: 1.3;
    }
    .item-when {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 12px;
      color: var(--muted);
      margin: 4px 0;
    }
    .item-notes {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
      white-space: pre-wrap;
    }
    .item-location {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    .item-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex-shrink: 0;
    }
    .item-actions button {
      font-size: 10px;
      padding: 6px 12px;
    }

    /* ── modal / form ──────────────────────── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.28);
      display: none;
      align-items: center; justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--bg);
      border-radius: 8px;
      max-width: 480px;
      width: 100%;
      padding: 28px 28px 24px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    }
    .modal h2 {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 24px;
      margin: 0 0 20px;
    }
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .field input[type=text],
    .field input[type=datetime-local],
    .field textarea {
      width: 100%;
      border: 1px solid var(--rule);
      border-radius: 4px;
      padding: 10px 12px;
      font-family: inherit;
      font-size: 15px;
      color: var(--ink);
      background: var(--bg);
    }
    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: var(--ink);
    }
    .field textarea { min-height: 80px; resize: vertical; }
    .field-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--ink);
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 18px;
    }

    .empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }
    .empty p { margin: 0 0 12px; }

    /* ── sky today card ─────────────────────── */
    .sky {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 18px 20px;
      margin: 0 0 24px;
      background: #fafafa;
    }
    .sky-label {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .sky-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 15px;
      line-height: 1.5;
    }
    .sky-cell {
      flex: 1 1 240px;
    }
    .sky-glyph {
      font-size: 24px;
      margin-right: 6px;
      vertical-align: -3px;
    }
    .sky-secondary {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      display: block;
    }
    /* per-item celestial */
    .item-sky {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 8px;
    }
    .item-sky .g { font-size: 14px; vertical-align: -2px; margin: 0 2px 0 6px; }

    /* ── view tabs ─────────────────────────── */
    .tabs {
      display: flex;
      gap: 24px;
      border-bottom: 1px solid var(--rule);
      margin: 0 0 20px;
    }
    .tab {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      background: transparent;
      border: 0;
      padding: 8px 0 12px;
      margin-bottom: -1px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab.active {
      color: var(--ink);
      border-bottom-color: var(--ink);
    }

    /* ── calendar (month view) ─────────────── */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-nav h2 {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 500;
      font-size: 22px;
      margin: 0;
    }
    .cal-nav-buttons { display: flex; gap: 8px; }
    .cal-nav-buttons button {
      padding: 6px 12px;
      font-size: 10px;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      border-top: 1px solid var(--rule);
      border-left: 1px solid var(--rule);
    }
    .cal-head {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding: 8px;
      text-align: center;
      background: #fafafa;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }
    .cal-cell {
      min-height: 96px;
      padding: 6px;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
      position: relative;
      cursor: pointer;
      transition: background 100ms;
      background: var(--bg);
    }
    .cal-cell:hover { background: #fafafa; }
    .cal-cell.other-month { background: #f7f7f7; }
    .cal-cell.other-month .cal-day { color: #bbb; }
    .cal-cell.other-month .cal-moon { opacity: 0.35; }
    .cal-cell.today {
      background: #fff8f8;
      box-shadow: inset 0 0 0 2px var(--accent);
    }
    .cal-day-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }
    .cal-day {
      font-family: 'Newsreader', serif;
      font-weight: 500;
      font-size: 15px;
      color: var(--ink);
      line-height: 1;
    }
    .cal-moon {
      font-size: 15px;
      line-height: 1;
    }
    .cal-ingress {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin: 2px 0 4px;
    }
    .cal-ingress .g { font-size: 12px; margin-right: 3px; vertical-align: -1px; }
    .cal-items { display: flex; flex-direction: column; gap: 2px; }
    .cal-item {
      font-size: 11px;
      color: var(--ink);
      padding: 2px 4px;
      background: #eef2f7;
      border-radius: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .cal-item:hover { background: #dee5ed; }
    .cal-more {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
    }
    @media (max-width: 600px) {
      .cal-cell { min-height: 68px; padding: 4px; }
      .cal-day { font-size: 13px; }
      .cal-moon { font-size: 12px; }
      .cal-item { font-size: 10px; padding: 1px 3px; }
    }
  </style>
</head>
<body>
  <main>
    <a class="backlink" href="/">← box fraise</a>

    <h1>My schedule</h1>
    <div class="sub" id="sub">personal calendar — private to you</div>

    <div class="sky" id="sky" style="display: none;">
      <div class="sky-label">Sky right now</div>
      <div class="sky-row" id="sky-row"></div>
    </div>

    <div class="toolbar" id="toolbar" style="display: none;">
      <button id="add-btn">+ New item</button>
      <button class="secondary" id="refresh-btn">Refresh</button>
    </div>

    <div class="tabs" id="tabs" style="display: none;">
      <button class="tab active" data-view="calendar">Calendar</button>
      <button class="tab" data-view="list">List</button>
    </div>

    <div id="content">
      <div class="status">loading…</div>
    </div>
  </main>

  <!-- Create / edit modal -->
  <div class="modal-backdrop" id="modal" role="dialog" aria-modal="true">
    <div class="modal">
      <h2 id="modal-title">New item</h2>
      <form id="item-form">
        <input type="hidden" id="f-id">
        <div class="field">
          <label for="f-title">Title</label>
          <input type="text" id="f-title" required maxlength="200">
        </div>
        <div class="field-row">
          <div class="field">
            <label for="f-starts">Starts</label>
            <input type="datetime-local" id="f-starts" required>
          </div>
          <div class="field">
            <label for="f-ends">Ends</label>
            <input type="datetime-local" id="f-ends" required>
          </div>
        </div>
        <div class="field">
          <label class="field-inline">
            <input type="checkbox" id="f-all-day"> All-day
          </label>
        </div>
        <div class="field">
          <label for="f-location">Location (optional)</label>
          <input type="text" id="f-location" maxlength="200">
        </div>
        <div class="field">
          <label for="f-notes">Private notes (optional)</label>
          <textarea id="f-notes" maxlength="4000" placeholder="Only visible to you."></textarea>
        </div>
        <div id="form-err" style="color: var(--accent); font-size: 13px; margin-top: 4px;"></div>
        <div class="modal-actions">
          <button type="button" class="secondary" id="cancel-btn">Cancel</button>
          <button type="submit" id="save-btn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/box-fraise.js"></script>
  <script>
    const content    = document.getElementById('content');
    const toolbar    = document.getElementById('toolbar');
    const tabs       = document.getElementById('tabs');
    const modal      = document.getElementById('modal');
    let currentView  = 'calendar';
    let cachedItems  = [];
    // Month currently displayed in the calendar (defaults to today).
    let calYear   = new Date().getFullYear();
    let calMonth  = new Date().getMonth(); // 0-11

    tabs.addEventListener('click', (e) => {
      const t = e.target.closest('.tab');
      if (!t) return;
      const view = t.dataset.view;
      if (view === currentView) return;
      currentView = view;
      for (const tab of tabs.children) tab.classList.toggle('active', tab.dataset.view === view);
      renderCurrentView();
    });
    const modalTitle = document.getElementById('modal-title');
    const form       = document.getElementById('item-form');
    const fId       = document.getElementById('f-id');
    const fTitle    = document.getElementById('f-title');
    const fStarts   = document.getElementById('f-starts');
    const fEnds     = document.getElementById('f-ends');
    const fAllDay   = document.getElementById('f-all-day');
    const fLocation = document.getElementById('f-location');
    const fNotes    = document.getElementById('f-notes');
    const formErr   = document.getElementById('form-err');

    function esc(s) {
      return String(s).replace(/[<>&"']/g, c => ({
        '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'
      })[c]);
    }
    function fmtWhen(item) {
      const s = new Date(item.starts_at);
      const e = new Date(item.ends_at);
      const sameDay = s.toDateString() === e.toDateString();
      const dOpts = { weekday: 'short', month: 'short', day: 'numeric' };
      const tOpts = { hour: 'numeric', minute: '2-digit' };
      if (item.is_all_day) {
        return sameDay ? s.toLocaleDateString(undefined, dOpts) + ' · all day'
                       : `${s.toLocaleDateString(undefined, dOpts)} → ${e.toLocaleDateString(undefined, dOpts)} · all days`;
      }
      if (sameDay) {
        return `${s.toLocaleDateString(undefined, dOpts)} · ${s.toLocaleTimeString(undefined, tOpts)} – ${e.toLocaleTimeString(undefined, tOpts)}`;
      }
      return `${s.toLocaleString(undefined, { ...dOpts, ...tOpts })} → ${e.toLocaleString(undefined, { ...dOpts, ...tOpts })}`;
    }

    async function boot() {
      const session = BoxFraise.loadSession();
      if (!session.token) {
        content.innerHTML = `
          <div class="empty">
            <p>You need a Box Fraise account to have a schedule.</p>
            <p><a class="btn" href="/join">Join Box Fraise</a></p>
          </div>
        `;
        return;
      }
      toolbar.style.display = 'flex';
      tabs.style.display = 'flex';
      renderSky(); // fire and forget; not required for main flow
      await refresh();
    }

    async function renderSky() {
      try {
        const r = await fetch('/v1/sky');
        if (!r.ok) return;
        const sky = await r.json();
        const skyEl  = document.getElementById('sky');
        const rowEl  = document.getElementById('sky-row');
        const fmtDate = (iso) => new Date(iso).toLocaleDateString(undefined, {
          weekday: 'short', month: 'short', day: 'numeric'
        });
        const nextNewMoon  = fmtDate(sky.moon.next_new_moon);
        const nextFullMoon = fmtDate(sky.moon.next_full_moon);
        rowEl.innerHTML = `
          <div class="sky-cell">
            <span class="sky-glyph">${sky.sun.sign.symbol}</span>
            Sun in <strong>${esc(sky.sun.sign.name)}</strong>
            <em>(${esc(sky.sun.sign.greek)})</em>
            <span class="sky-secondary">
              ${esc(sky.sun.sign.element)} · ${esc(sky.sun.sign.modality)} · ruled by ${esc(sky.sun.sign.traditional_ruler.greek)}
            </span>
            <span class="sky-secondary">season · ${esc(sky.sun.season)}</span>
          </div>
          <div class="sky-cell">
            <span class="sky-glyph">${sky.moon.sign.symbol}</span>
            Moon in <strong>${esc(sky.moon.sign.name)}</strong>
            <em>(${esc(sky.moon.sign.greek)})</em>
            <span class="sky-secondary">
              ${esc(sky.moon.phase_name)} · ${sky.moon.illumination_pct}% illuminated
            </span>
            <span class="sky-secondary">next new · ${esc(nextNewMoon)} · next full · ${esc(nextFullMoon)}</span>
          </div>
        `;
        skyEl.style.display = 'block';
      } catch { /* silent */ }
    }

    async function refresh() {
      content.innerHTML = `<div class="status">loading…</div>`;
      try {
        const items = await BoxFraise.api?.('/me/personal-items') ?? await fetchItems();
        cachedItems = items;
        renderCurrentView();
      } catch (err) {
        content.innerHTML = `<div class="status err">${esc(err.message)}</div>`;
        console.error(err);
      }
    }

    function renderCurrentView() {
      if (currentView === 'calendar') renderCalendar(cachedItems);
      else render(cachedItems);
    }

    async function fetchItems() {
      const { token } = BoxFraise.loadSession();
      const r = await fetch('/v1/me/personal-items', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      const text = await r.text();
      let body = null;
      if (text) { try { body = JSON.parse(text); } catch {} }
      if (!r.ok) {
        throw new Error((body && (body.message || body.error)) || text || ('http ' + r.status));
      }
      return body || [];
    }

    function render(items) {
      content.replaceChildren();
      if (!items.length) {
        content.innerHTML = `
          <div class="empty">
            <p>No items yet.</p>
            <p>Add your first one — a haircut, a meeting, a reminder.</p>
          </div>
        `;
        return;
      }
      // Sort: upcoming first, past below.
      const now = Date.now();
      items.sort((a, b) => new Date(a.starts_at) - new Date(b.starts_at));
      const upcoming = items.filter(i => new Date(i.ends_at).getTime() >= now);
      const past     = items.filter(i => new Date(i.ends_at).getTime() <  now).reverse();
      for (const it of upcoming) content.append(renderItem(it, false));
      if (past.length) {
        const label = document.createElement('div');
        label.className = 'status';
        label.textContent = 'past';
        label.style.marginTop = '24px';
        content.append(label);
        for (const it of past) content.append(renderItem(it, true));
      }
    }

    function renderItem(item, isPast) {
      const wrap = document.createElement('article');
      wrap.className = 'item';
      if (isPast) wrap.style.opacity = '0.55';
      const body = document.createElement('div');
      body.className = 'item-body';
      const t = document.createElement('h3');
      t.className = 'item-title';
      t.textContent = item.title;
      body.append(t);
      const w = document.createElement('div');
      w.className = 'item-when';
      w.textContent = fmtWhen(item);
      body.append(w);
      if (item.location) {
        const l = document.createElement('div');
        l.className = 'item-location';
        l.textContent = item.location;
        body.append(l);
      }
      if (item.notes) {
        const n = document.createElement('div');
        n.className = 'item-notes';
        n.textContent = item.notes;
        body.append(n);
      }
      if (item.celestial) {
        const sky = document.createElement('div');
        sky.className = 'item-sky';
        const c = item.celestial;
        sky.innerHTML = `${esc(c.moon_phase_name)}<span class="g">${c.moon_sign_symbol}</span>· sun<span class="g">${c.sun_sign_symbol}</span>· ${esc(c.season)}`;
        body.append(sky);
      }
      const actions = document.createElement('div');
      actions.className = 'item-actions';
      const editBtn = document.createElement('button');
      editBtn.className = 'secondary';
      editBtn.textContent = 'Edit';
      editBtn.onclick = () => openModal(item);
      const delBtn = document.createElement('button');
      delBtn.className = 'secondary';
      delBtn.textContent = 'Delete';
      delBtn.onclick = () => deleteItem(item);
      actions.append(editBtn, delBtn);
      wrap.append(body, actions);
      return wrap;
    }

    // ── Calendar (month view) ─────────────────────────────────────
    function renderCalendar(items) {
      content.replaceChildren();

      // Nav
      const nav = document.createElement('div');
      nav.className = 'cal-nav';
      const title = document.createElement('h2');
      const monthName = new Date(calYear, calMonth, 1).toLocaleDateString(undefined, {
        month: 'long', year: 'numeric'
      });
      title.textContent = monthName;
      const buttons = document.createElement('div');
      buttons.className = 'cal-nav-buttons';
      const prevBtn = document.createElement('button');
      prevBtn.className = 'secondary';
      prevBtn.textContent = '‹ Prev';
      prevBtn.onclick = () => { shiftMonth(-1); renderCalendar(cachedItems); };
      const todayBtn = document.createElement('button');
      todayBtn.className = 'secondary';
      todayBtn.textContent = 'Today';
      todayBtn.onclick = () => {
        const n = new Date();
        calYear = n.getFullYear(); calMonth = n.getMonth();
        renderCalendar(cachedItems);
      };
      const nextBtn = document.createElement('button');
      nextBtn.className = 'secondary';
      nextBtn.textContent = 'Next ›';
      nextBtn.onclick = () => { shiftMonth(1); renderCalendar(cachedItems); };
      buttons.append(prevBtn, todayBtn, nextBtn);
      nav.append(title, buttons);
      content.append(nav);

      // Group items by ISO date string.
      const byDate = new Map();
      for (const it of items) {
        const key = new Date(it.starts_at).toDateString();
        if (!byDate.has(key)) byDate.set(key, []);
        byDate.get(key).push(it);
      }

      // Grid
      const grid = document.createElement('div');
      grid.className = 'calendar';

      // Header — week starts Monday.
      const dowNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      for (const n of dowNames) {
        const h = document.createElement('div');
        h.className = 'cal-head';
        h.textContent = n;
        grid.append(h);
      }

      // Which date fills the top-left cell? Monday-start alignment.
      const first = new Date(calYear, calMonth, 1);
      // JS getDay(): 0=Sun..6=Sat. Convert to Mon-start (0=Mon..6=Sun).
      const monStartDow = (first.getDay() + 6) % 7;
      const gridStart = new Date(first);
      gridStart.setDate(1 - monStartDow);

      // Always render 6 weeks (42 cells).
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      for (let i = 0; i < 42; i++) {
        const day = new Date(gridStart);
        day.setDate(gridStart.getDate() + i);
        const cell = renderCalCell(day, byDate.get(day.toDateString()) || [], today);
        grid.append(cell);
      }

      content.append(grid);
    }

    function renderCalCell(day, dayItems, today) {
      const cell = document.createElement('div');
      cell.className = 'cal-cell';
      const inThisMonth = day.getMonth() === calMonth;
      if (!inThisMonth) cell.classList.add('other-month');
      if (day.getTime() === today.getTime()) cell.classList.add('today');
      cell.onclick = (e) => {
        // Only trigger day-click if the click wasn't on an item chip.
        if (e.target.closest('.cal-item')) return;
        openModalWithDate(day);
      };

      // Head row: day number + moon glyph
      const head = document.createElement('div');
      head.className = 'cal-day-row';
      const num = document.createElement('div');
      num.className = 'cal-day';
      num.textContent = day.getDate();
      const moon = document.createElement('div');
      moon.className = 'cal-moon';
      const noon = new Date(day); noon.setHours(12, 0, 0, 0);
      moon.textContent = BoxFraise.moonPhaseGlyph(BoxFraise.moonPhase(noon));
      moon.title = BoxFraise.moonPhaseName(BoxFraise.moonPhase(noon));
      head.append(num, moon);
      cell.append(head);

      // Sun-sign ingress?
      const ingress = BoxFraise.sunSignIngressOn(noon);
      if (ingress) {
        const ing = document.createElement('div');
        ing.className = 'cal-ingress';
        ing.innerHTML = `<span class="g">${ingress.glyph}</span>sun → ${esc(ingress.name)}`;
        cell.append(ing);
      }

      // Items (up to 3)
      const listEl = document.createElement('div');
      listEl.className = 'cal-items';
      const shown = dayItems.slice(0, 3);
      for (const it of shown) {
        const chip = document.createElement('div');
        chip.className = 'cal-item';
        chip.textContent = it.title;
        chip.title = it.title;
        chip.onclick = (e) => { e.stopPropagation(); openModal(it); };
        listEl.append(chip);
      }
      if (dayItems.length > shown.length) {
        const more = document.createElement('div');
        more.className = 'cal-more';
        more.textContent = `+ ${dayItems.length - shown.length} more`;
        listEl.append(more);
      }
      cell.append(listEl);
      return cell;
    }

    function shiftMonth(delta) {
      calMonth += delta;
      if (calMonth < 0)  { calMonth = 11; calYear -= 1; }
      if (calMonth > 11) { calMonth = 0;  calYear += 1; }
    }

    function openModalWithDate(day) {
      const s = new Date(day); s.setHours(new Date().getHours(), 0, 0, 0);
      const e = new Date(s.getTime() + 60 * 60 * 1000);
      openModal(null);
      fStarts.value = toLocalInput(s.toISOString());
      fEnds.value   = toLocalInput(e.toISOString());
    }

    async function deleteItem(item) {
      if (!confirm(`Delete "${item.title}"?`)) return;
      try {
        const { token } = BoxFraise.loadSession();
        const r = await fetch('/v1/me/personal-items/' + item.id, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (!r.ok && r.status !== 204) throw new Error('delete failed: ' + r.status);
        await refresh();
      } catch (err) {
        alert(err.message);
      }
    }

    // Modal
    function openModal(item) {
      formErr.textContent = '';
      if (item) {
        modalTitle.textContent = 'Edit item';
        fId.value       = item.id;
        fTitle.value    = item.title;
        fStarts.value   = toLocalInput(item.starts_at);
        fEnds.value     = toLocalInput(item.ends_at);
        fAllDay.checked = !!item.is_all_day;
        fLocation.value = item.location || '';
        fNotes.value    = item.notes || '';
      } else {
        modalTitle.textContent = 'New item';
        fId.value       = '';
        fTitle.value    = '';
        const now = new Date();
        const oneHr = new Date(now.getTime() + 60 * 60 * 1000);
        fStarts.value   = toLocalInput(now.toISOString());
        fEnds.value     = toLocalInput(oneHr.toISOString());
        fAllDay.checked = false;
        fLocation.value = '';
        fNotes.value    = '';
      }
      modal.classList.add('open');
      setTimeout(() => fTitle.focus(), 20);
    }
    function closeModal() { modal.classList.remove('open'); }

    document.getElementById('add-btn').onclick     = () => openModal(null);
    document.getElementById('cancel-btn').onclick  = closeModal;
    document.getElementById('refresh-btn').onclick = refresh;

    form.onsubmit = async (e) => {
      e.preventDefault();
      formErr.textContent = '';
      const payload = {
        title:      fTitle.value.trim(),
        starts_at:  new Date(fStarts.value).toISOString(),
        ends_at:    new Date(fEnds.value).toISOString(),
        is_all_day: fAllDay.checked,
        location:   fLocation.value.trim() || null,
        notes:      fNotes.value.trim()    || null,
      };
      const { token } = BoxFraise.loadSession();
      const id = fId.value;
      const method = id ? 'PATCH' : 'POST';
      const url    = id ? '/v1/me/personal-items/' + id : '/v1/me/personal-items';
      try {
        const r = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify(payload),
        });
        const text = await r.text();
        let body = null;
        if (text) { try { body = JSON.parse(text); } catch {} }
        if (!r.ok) {
          formErr.textContent = (body && (body.message || body.error)) || text || ('http ' + r.status);
          return;
        }
        closeModal();
        await refresh();
      } catch (err) {
        formErr.textContent = err.message;
      }
    };

    // datetime-local expects "YYYY-MM-DDTHH:MM" in *local* time.
    function toLocalInput(isoUTC) {
      const d = new Date(isoUTC);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    boot();
  </script>
</body>
</html>
