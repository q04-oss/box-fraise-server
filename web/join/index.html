<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join — box fraise</title>
  <meta name="description" content="Join Box Fraise. Silent, in-browser identity — get verified in person at an event.">
  <meta name="theme-color" content="#ffffff">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:     #ffffff;
      --ink:    #1a1a1a;
      --rule:   #e6e6e6;
      --muted:  #666666;
      --accent: #b21b1b;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Newsreader', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    main {
      flex: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 56px 24px 64px;
    }
    .backlink {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-decoration: none;
      display: inline-block;
      margin-bottom: 40px;
    }
    .backlink:hover { color: var(--ink); }
    h1 {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 500;
      font-size: clamp(30px, 5vw, 44px);
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin: 0 0 24px;
    }
    p {
      font-size: 17px;
      line-height: 1.6;
      margin: 0 0 18px;
    }
    .card {
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 22px 24px;
      margin: 28px 0;
    }
    .card .label {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .card .value {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 13px;
      color: var(--ink);
      word-break: break-all;
    }
    .status {
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding: 8px 0;
    }
    .status.ok  { color: #2c6e35; }
    .status.err { color: var(--accent); }
    .cta {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 20px;
      border: 1px solid var(--ink);
      border-radius: 4px;
      background: var(--ink);
      color: var(--bg);
      font-family: 'IBM Plex Mono', ui-monospace, Menlo, monospace;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      text-decoration: none;
      cursor: pointer;
    }
    .cta.secondary {
      background: var(--bg);
      color: var(--ink);
    }
    .unsupported {
      background: #fbe9e9;
      border-radius: 4px;
      padding: 14px 16px;
      color: var(--accent);
      font-size: 14px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <main>
    <a class="backlink" href="/">← box fraise</a>

    <h1>Join</h1>

    <div id="content">
      <div class="status">initialising…</div>
    </div>
  </main>

  <script src="/js/box-fraise.js"></script>
  <script>
    const content = document.getElementById('content');

    function html(strings, ...values) {
      // Tiny tagged template — trusted content only, no interpolation of user data.
      let s = '';
      for (let i = 0; i < strings.length; i++) {
        s += strings[i];
        if (i < values.length) s += values[i];
      }
      return s;
    }

    function esc(s) {
      return String(s).replace(/[<>&"']/g, c => ({
        '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'
      })[c]);
    }

    function checkSupport() {
      if (!window.crypto || !window.crypto.subtle) return 'WebCrypto not available';
      if (!window.indexedDB) return 'IndexedDB not available';
      return null;
    }

    async function boot() {
      const unsupported = checkSupport();
      if (unsupported) {
        content.innerHTML = `<div class="unsupported">
          Your browser doesn't support the crypto primitives Box Fraise needs (${esc(unsupported)}).
          Please use a modern browser (Safari 15+, Chrome 90+, Firefox 90+, Edge 90+).
        </div>`;
        return;
      }

      // If already joined, jump straight to the pass state.
      const session = BoxFraise.loadSession();
      if (session.token) {
        return renderAlreadyJoined(session);
      }

      try {
        content.innerHTML = `<div class="status">generating your device key…</div>`;
        const { userId } = await BoxFraise.registerIfNeeded();
        content.innerHTML = `<div class="status ok">joined</div>` + joinedBody(userId);
      } catch (err) {
        content.innerHTML = `<div class="status err">joining failed</div>
          <p>${esc(err.message)}</p>
          <p>Try refreshing. If the issue persists, the server might be down — try again in a minute.</p>`;
        console.error(err);
      }
    }

    function joinedBody(userId) {
      return `
        <p>Your Box Fraise account exists. A P-256 keypair was generated in this browser
        and stored locally — the private key can't leave this browser profile.
        No email, no password, no phone number needed.</p>

        <p>The next step happens in person. At a Box Fraise event, open your Pass on this
        same browser and let an organiser scan the QR code. That physical moment is
        what turns you from <em>pending</em> into <em>verified</em>.</p>

        <div class="card">
          <div class="label">Your Box Fraise ID</div>
          <div class="value">${esc(userId)}</div>
        </div>

        <p style="margin-top: 24px;">
          <a class="cta" href="/pass">Open my Pass</a>
        </p>
      `;
    }

    function renderAlreadyJoined(session) {
      content.innerHTML = `
        <div class="status ok">already joined</div>
        <p>This browser is already paired with a Box Fraise account.</p>
        <div class="card">
          <div class="label">Your Box Fraise ID</div>
          <div class="value">${esc(session.userId)}</div>
        </div>
        <p style="margin-top: 24px;">
          <a class="cta" href="/pass">Open my Pass</a>
        </p>
      `;
    }

    boot();
  </script>
</body>
</html>
